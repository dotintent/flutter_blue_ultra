name: flutter_blue_ultra_linux
description: Linux implementation of the flutter_blue_ultra plugin.
version: 2.1.0
homepage: https://github.com/dotintent/flutter_blue_ultra
repository: https://github.com/dotintent/flutter_blue_ultra
issue_tracker: https://github.com/dotintent/flutter_blue_ultra/issues
documentation: https://pub.dev/documentation/flutter_blue_ultra_linux/latest/
topics:
  - bluetooth
  - ble
  - bluetooth-low-energy

environment:
  sdk: ^3.0.0
  flutter: '>=3.7.0'

dependencies:
  bluez: '>=0.7.8 <0.9.0'
  flutter:
    sdk: flutter
  flutter_blue_ultra_platform_interface: 2.1.0
  rxdart: '>=0.27.0 <0.29.0'

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: flutter_blue_ultra
    platforms:
      linux:
        dartPluginClass: FlutterBlueUltraLinux

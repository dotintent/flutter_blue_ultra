name: flutter_blue_ultra_example
description: Demonstrates how to use the flutter_blue_ultra plugin.

publish_to: 'none'

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  flutter_blue_ultra:
    path: ../

  permission_handler: 12.0.1
  device_info_plus: ^11.5.0
  flutter_bloc: 9.1.1
  equatable: 2.0.8

dev_dependencies:
  flutter_lints: ^5.0.0

dependency_overrides:
  flutter_blue_ultra_android:
    path: ../../flutter_blue_ultra_android
  flutter_blue_ultra_darwin:
    path: ../../flutter_blue_ultra_darwin
  flutter_blue_ultra_linux:
    path: ../../flutter_blue_ultra_linux
  flutter_blue_ultra_platform_interface:
    path: ../../flutter_blue_ultra_platform_interface
  flutter_blue_ultra_web:
    path: ../../flutter_blue_ultra_web

flutter:
  uses-material-design: true

  fonts:
    - family: Bradford
      fonts:
        - asset: assets/fonts/BradfordLL-Medium.otf
          weight: 500

    - family: AcuminProWide
      fonts:
        - asset: assets/fonts/acuminprowide-regular.otf
          weight: 400
        - asset: assets/fonts/acuminprowide-medium.otf
          weight: 500
        - asset: assets/fonts/acuminprowide-semibold.otf
          weight: 600
        - asset: assets/fonts/acuminprowide-bold.otf
          weight: 700
